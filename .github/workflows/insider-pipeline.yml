name: Insider Monitor

on:
  workflow_dispatch: {}              # Handmatig triggeren vanuit GitHub UI
  schedule:
    - cron: "0 7 * * 1-5"           # 09:00 CEST (07:00 UTC) ma–vr
    - cron: "0 16 * * 1-5"          # 18:00 CEST (16:00 UTC) ma–vr

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      SEC_USER_AGENT:     ${{ secrets.SEC_USER_AGENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies
        run: pip install requests yfinance

      - name: Directories
        run: mkdir -p data/reports

      # ── Stap 1: Monitor (discovery + analyse + Telegram) ─────────────────
      - name: Monitor
        run: |
          python3 scripts/monitor.py \
            --portfolio BH NKE IPX SBSW \
            --output-dir data/reports \
            --telegram

      # ── Stap 2: Diepgaande kandidaat research ────────────────────────────
      - name: Kandidaat research
        run: |
          python3 scripts/candidate_research.py \
            --monitor-json data/reports/monitor.json \
            --portfolio BH NKE IPX SBSW \
            --telegram
        continue-on-error: true

      # ── Reports bewaren voor debugging ───────────────────────────────────
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          retention-days: 7
          path: data/reports/
